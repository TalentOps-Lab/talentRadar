<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Capability Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --border: #252830;
    --accent-commercial: #f5a623;
    --accent-organised: #4ecdc4;
    --accent-strategic: #e040fb;
    --accent-technical: #69f0ae;
    --accent-overall: #ff6b6b;
    --text: #e8eaf0;
    --muted: #6b7080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 32px;
  }

  header { text-align: center; margin-bottom: 48px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--text);
  }
  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }

  .pillars-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    max-width: 1100px;
    margin: 0 auto 52px;
  }

  .pillar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px 20px;
    position: relative;
  }

  .pillar-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .pillar-card[data-pillar="commercial"]::before { background: var(--accent-commercial); }
  .pillar-card[data-pillar="organised"]::before  { background: var(--accent-organised); }
  .pillar-card[data-pillar="strategic"]::before  { background: var(--accent-strategic); }
  .pillar-card[data-pillar="technical"]::before  { background: var(--accent-technical); }

  .pillar-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.12em;
    margin-bottom: 2px;
  }
  .pillar-card[data-pillar="commercial"] .pillar-label { color: var(--accent-commercial); }
  .pillar-card[data-pillar="organised"]  .pillar-label { color: var(--accent-organised); }
  .pillar-card[data-pillar="strategic"]  .pillar-label { color: var(--accent-strategic); }
  .pillar-card[data-pillar="technical"]  .pillar-label { color: var(--accent-technical); }

  .pillar-sub {
    font-size: 0.76rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
    margin-bottom: 10px;
    max-width: 400px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid;
    border-radius: 0 6px 6px 0;
  }
  .pillar-sub::before {
    display: block;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
    opacity: 0.6;
    content: '5 / 5 looks like';
  }
  .pillar-card[data-pillar="commercial"] .pillar-sub { border-color: var(--accent-commercial); }
  .pillar-card[data-pillar="organised"]  .pillar-sub { border-color: var(--accent-organised); }
  .pillar-card[data-pillar="strategic"]  .pillar-sub { border-color: var(--accent-strategic); }
  .pillar-card[data-pillar="technical"]  .pillar-sub { border-color: var(--accent-technical); }

  .pillar-avg {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }
  .pillar-avg span { font-weight: 500; color: var(--text); }

  canvas.radar {
    display: block;
    margin: 0 auto;
    cursor: crosshair;
    max-width: 100%;
  }

  .scores-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.76rem;
  }

  .label-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
    position: relative;
  }

  .score-item .label {
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }

  /* Info button */
  .info-btn {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid #454860;
    color: #454860;
    font-size: 9px;
    font-weight: 700;
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    user-select: none;
    font-family: Georgia, serif;
  }
  .info-btn:hover,
  .info-btn.active {
    border-color: var(--text);
    color: var(--text);
    background: #252830;
  }

  /* Tooltip popup — absolutely positioned, rendered via JS into body */
  .tooltip-popup {
    position: fixed;
    width: 300px;
    background: #1a1d28;
    border: 1px solid #353a52;
    border-radius: 12px;
    padding: 14px 16px;
    z-index: 9999;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    animation: fadeIn 0.12s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tooltip-popup .tt-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .tooltip-popup .tt-intro {
    font-size: 0.72rem;
    color: #6b7080;
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-size: 0.65rem;
  }

  .tooltip-popup .tt-item {
    display: flex;
    gap: 8px;
    font-size: 0.75rem;
    color: #9aa0b4;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .tooltip-popup .tt-item:last-child { margin-bottom: 0; }

  .tooltip-popup .tt-tick {
    flex-shrink: 0;
    font-size: 0.7rem;
    margin-top: 2px;
    font-weight: 700;
  }

  /* Score dots */
  .score-item .dots {
    display: flex;
    gap: 4px;
  }
  .score-item .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .score-item .val {
    width: 18px;
    text-align: right;
    font-weight: 500;
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  /* Overall */
  .overall-section { max-width: 560px; margin: 0 auto; text-align: center; }
  .overall-section h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--accent-overall);
    margin-bottom: 4px;
  }
  .overall-section > p {
    font-size: 0.78rem; color: var(--muted); margin-bottom: 20px; letter-spacing: 0.04em;
  }
  .overall-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px 24px; position: relative;
  }
  .overall-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: 16px 16px 0 0; background: var(--accent-overall);
  }
  .overall-scores {
    display: flex; justify-content: center; align-items: center;
    gap: 28px; margin-top: 20px; flex-wrap: wrap;
  }
  .overall-score-item { text-align: center; }
  .overall-score-item .name {
    font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem;
    letter-spacing: 0.1em; margin-bottom: 2px;
  }
  .overall-score-item .num { font-size: 1.5rem; font-weight: 300; }
  .divider {
    max-width: 1100px; margin: 0 auto 40px;
    border: none; border-top: 1px solid var(--border);
  }

  @media (max-width: 700px) {
    .pillars-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Talent Capability Radar</h1>
  <p>DRAG THE DOTS ON EACH AXIS TO SET SCORES · 1–5</p>
</header>

<p class="hint">Click or drag along each axis to score &nbsp;·&nbsp; click <strong style="color:var(--text);font-style:italic">i</strong> on any row to see what good looks like</p>

<div class="pillars-grid" id="pillarsGrid"></div>

<hr class="divider">

<div class="overall-section">
  <h2>Overall Score</h2>
  <p>AVERAGE ACROSS ALL FOUR PILLARS</p>
  <div class="overall-card">
    <canvas id="overallRadar" class="radar" width="460" height="400"></canvas>
    <div class="overall-scores" id="overallScores"></div>
  </div>
</div>

<script>
const MAX = 5;

const PILLARS = [

        'Proactively shares market intelligence and pipeline health before being asked'

      { label: 'Accountability, Trust & Adaptability', good: [

    ]
  },
  {
    id: 'organised', label: 'Organised', color: '#4ecdc4',
    sub: 'A process machine — every role runs like a project, every stage is owned, and every bottleneck is pre-empted before it costs time or quality. The funnel is always visible, always moving, and always improving.',
    axes: [
      { label: 'Project Management & Delivery', good: [
        'Runs multiple complex roles simultaneously without dropping quality or pace on any of them',
        'Uses clear project structures — kick-offs, milestones, retrospectives — not just reactive task lists',
        'Delivery is predictable: hiring managers always know where things stand without having to chase'
      ]},
      { label: 'Owning the Hiring Process', good: [
        'Drives the process end-to-end — never waits for the HM to push things forward',

        'Treats every stage as a conversion opportunity, not just a box to tick'
      ]},
      { label: 'Driving SLAs, Outcomes & Efficiency', good: [
        'Knows their funnel metrics cold — time to shortlist, screen-to-offer ratio, offer acceptance rate',
        'Identifies where conversion is leaking and fixes it proactively, not after a review',
        'Quality over volume: fewer, better candidates rather than flooding the process'

      { label: 'Preparation & Resource Planning', good: [
        'Fully briefed before every role opens — comp range, must-haves vs. nice-to-haves, team context, why now',

      ]},

  },

  {
    id: 'technical', label: 'Technical', color: '#69f0ae',

      ]},
      { label: 'Understanding Industry Trends', good: [

        'Advises hiring managers on talent availability changes before they affect headcount plans'
      ]},
      { label: 'Meta Language & Technical Fluency', good: [
        'Can hold a credible conversation with engineers, finance, or ops about their domain — not just HR-speak',

const pillarScores = {};
PILLARS.forEach(p => { pillarScores[p.id] = [3, 3, 3, 3, 3]; });

/* ---- Tooltip logic ---- */
let activeTooltip = null;

function closeTooltip() {
  if (activeTooltip) {
    activeTooltip.el.remove();
    activeTooltip.btn.classList.remove('active');
    activeTooltip = null;
  }
}

function openTooltip(btn, axis, color) {
  // Close any open tooltip first
  if (activeTooltip) {
    const wasThisBtn = activeTooltip.btn === btn;
    closeTooltip();
    if (wasThisBtn) return; // toggle off
  }

  const popup = document.createElement('div');
  popup.className = 'tooltip-popup';
  popup.innerHTML = `
    <div class="tt-title" style="color:${color}">${axis.label}</div>
    <div class="tt-intro">What good looks like</div>
    ${axis.good.map(g => `
      <div class="tt-item">
        <span class="tt-tick" style="color:${color}">✓</span>
        <span>${g}</span>
      </div>
    `).join('')}
  `;
  document.body.appendChild(popup);

  // Use fixed positioning — coordinates are viewport-relative, no scroll offset needed
  const rect = btn.getBoundingClientRect();
  const popW = 300;
  // Measure height after inserting into DOM
  popup.style.visibility = 'hidden';
  popup.style.left = '0px';
  popup.style.top = '0px';
  const popH = popup.offsetHeight;
  popup.style.visibility = '';

  let left = rect.left;
  let top = rect.top - popH - 8;

  // Prevent right overflow
  if (left + popW > window.innerWidth - 16) {
    left = window.innerWidth - popW - 16;
  }
  // Prevent left overflow
  if (left < 8) left = 8;
  // If would go above viewport, show below the button instead
  if (top < 8) {
    top = rect.bottom + 8;
  }

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';

  btn.classList.add('active');
  activeTooltip = { el: popup, btn };
}

// Close tooltip when clicking outside
document.addEventListener('click', e => {
  if (activeTooltip && !activeTooltip.btn.contains(e.target) && !activeTooltip.el.contains(e.target)) {
    closeTooltip();
  }
});

/* ---- Radar Math ---- */
function radarPoints(scores, cx, cy, maxR, n) {
  return scores.map((s, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const r = (s / MAX) * maxR;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });
}

function axisPoint(i, n, cx, cy, r) {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

function drawRadar(canvas, scores, color, labels, maxR) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const n = scores.length;

  ctx.clearRect(0, 0, W, H);

  for (let ring = 1; ring <= MAX; ring++) {
    const f = ring / MAX;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      i === 0 ? ctx.moveTo(cx + f*maxR*Math.cos(a), cy + f*maxR*Math.sin(a))
              : ctx.lineTo(cx + f*maxR*Math.cos(a), cy + f*maxR*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle = ring === MAX ? '#30333d' : '#1e2028';
    ctx.lineWidth = ring === MAX ? 1.2 : 0.7;
    ctx.stroke();
  }

  for (let ring = 1; ring <= MAX; ring++) {
    const f = ring / MAX;
    ctx.fillStyle = '#3a3d4a'; ctx.font = '9px DM Sans';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(ring, cx + 4, cy - f * maxR);
  }

  for (let i = 0; i < n; i++) {
    const ap = axisPoint(i, n, cx, cy, maxR);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ap.x, ap.y);
    ctx.strokeStyle = '#2a2d36'; ctx.lineWidth = 1; ctx.stroke();
  }

  const pts = radarPoints(scores, cx, cy, maxR, n);
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = color + '28'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();

  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = '#0e0f14'; ctx.lineWidth = 2; ctx.stroke();
  });

  const labelPad = 20;
  for (let i = 0; i < n; i++) {
    const ap = axisPoint(i, n, cx, cy, maxR + labelPad);
    const words = labels[i].split(' ');
    const lines = []; let line = '';
    words.forEach(w => {
      if ((line + ' ' + w).trim().length > 16) { lines.push(line.trim()); line = w; }
      else line = (line + ' ' + w).trim();
    });
    if (line) lines.push(line);
    ctx.fillStyle = '#8a8f9e'; ctx.font = '500 9.5px DM Sans';
    ctx.textAlign = ap.x < cx - 5 ? 'right' : ap.x > cx + 5 ? 'left' : 'center';
    ctx.textBaseline = ap.y < cy - 5 ? 'bottom' : ap.y > cy + 5 ? 'top' : 'middle';
    lines.forEach((l, li) => ctx.fillText(l, ap.x, ap.y + (li - (lines.length-1)/2)*12));
  }
}

function drawOverallRadar(canvas, pillarAvgs, colors, labels) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2 - 10;
  const n = pillarAvgs.length;
  const maxR = Math.min(W, H) * 0.33;

  ctx.clearRect(0, 0, W, H);

  for (let ring = 1; ring <= MAX; ring++) {
    const f = ring / MAX;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const a = (Math.PI*2*i/n) - Math.PI/2;
      ctx.lineTo(cx + f*maxR*Math.cos(a), cy + f*maxR*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle = ring === MAX ? '#30333d' : '#1e2028';
    ctx.lineWidth = ring === MAX ? 1.2 : 0.7; ctx.stroke();
  }

  for (let ring = 1; ring <= MAX; ring++) {
    const f = ring/MAX;
    ctx.fillStyle='#3a3d4a'; ctx.font='9px DM Sans';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(ring, cx+4, cy - f*maxR);
  }

  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2*i/n) - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+maxR*Math.cos(a), cy+maxR*Math.sin(a));
    ctx.strokeStyle='#2a2d36'; ctx.lineWidth=1; ctx.stroke();
  }

  const pts = radarPoints(pillarAvgs, cx, cy, maxR, n);
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.fillStyle='#ff6b6b28'; ctx.fill();
  ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2.5; ctx.stroke();

  pts.forEach((p,i) => {
    ctx.beginPath(); ctx.arc(p.x,p.y,9,0,Math.PI*2);
    ctx.fillStyle=colors[i]; ctx.fill();
    ctx.strokeStyle='#0e0f14'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#0e0f14'; ctx.font='bold 8px DM Sans';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pillarAvgs[i].toFixed(1), p.x, p.y);
  });

  const labelPad = 30;
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2*i/n) - Math.PI/2;
    const lx = cx+(maxR+labelPad)*Math.cos(a), ly = cy+(maxR+labelPad)*Math.sin(a);
    ctx.fillStyle=colors[i]; ctx.font="700 12px 'Bebas Neue',sans-serif";
    ctx.textAlign = lx<cx-5?'right':lx>cx+5?'left':'center';
    ctx.textBaseline = ly<cy-5?'bottom':ly>cy+5?'top':'middle';
    ctx.fillText(labels[i].toUpperCase(), lx, ly);
  }
}

/* ---- Interaction ---- */
function getCanvasPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX-rect.left)*scaleX, y: (clientY-rect.top)*scaleY };
}

function scoreFromPos(canvas, pos, axisIndex, n, maxR) {
  const cx = canvas.width/2, cy = canvas.height/2;
  const angle = (Math.PI*2*axisIndex/n) - Math.PI/2;
  const proj = (pos.x-cx)*Math.cos(angle) + (pos.y-cy)*Math.sin(angle);
  return Math.max(1, Math.min(MAX, Math.round((Math.max(0,Math.min(maxR,proj))/maxR)*MAX)));
}

function nearestAxis(canvas, pos, n, maxR) {
  const cx = canvas.width/2, cy = canvas.height/2;
  let best=-1, bestDist=Infinity;
  for (let i=0; i<n; i++) {
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    const ax=cx+maxR*Math.cos(angle), ay=cy+maxR*Math.sin(angle);
    const dx=pos.x-cx, dy=pos.y-cy, lx=ax-cx, ly=ay-cy;
    const t=Math.max(0,Math.min(1,(dx*lx+dy*ly)/(lx*lx+ly*ly)));
    const dist=Math.sqrt((cx+t*lx-pos.x)**2+(cy+t*ly-pos.y)**2);
    if (dist<bestDist) { bestDist=dist; best=i; }
  }
  return bestDist<45 ? best : -1;
}

function setupInteraction(canvas, pillarId, color, axes) {
  const n=5; let activeAxis=-1;
  const getMaxR = () => Math.min(canvas.width, canvas.height)*0.33;

  function update(e) {
    if (activeAxis===-1) return;
    e.preventDefault();
    pillarScores[pillarId][activeAxis] = scoreFromPos(canvas, getCanvasPos(canvas,e), activeAxis, n, getMaxR());
    drawRadar(canvas, pillarScores[pillarId], color, axes.map(a=>a.label), getMaxR());
    updateScoreList(pillarId, color);
    refreshOverall();
  }

  canvas.addEventListener('mousedown', e => { activeAxis=nearestAxis(canvas,getCanvasPos(canvas,e),n,getMaxR()); update(e); });
  canvas.addEventListener('mousemove', update);
  canvas.addEventListener('mouseup', ()=>{ activeAxis=-1; });
  canvas.addEventListener('mouseleave', ()=>{ activeAxis=-1; });
  canvas.addEventListener('touchstart', e=>{ activeAxis=nearestAxis(canvas,getCanvasPos(canvas,e),n,getMaxR()); update(e); }, {passive:false});
  canvas.addEventListener('touchmove', update, {passive:false});
  canvas.addEventListener('touchend', ()=>{ activeAxis=-1; });

  drawRadar(canvas, pillarScores[pillarId], color, axes.map(a=>a.label), getMaxR());
}

function updateScoreList(pillarId, color) {
  const list = document.getElementById(`list-${pillarId}`);
  const scores = pillarScores[pillarId];
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  document.getElementById(`avg-${pillarId}`).innerHTML = `Average: <span>${avg.toFixed(1)} / ${MAX}</span>`;
  scores.forEach((s,i) => {
    const item = list.querySelectorAll('.score-item')[i];
    item.querySelectorAll('.dot').forEach((d,di) => {
      if (di<s) { d.style.background=color; d.style.borderColor=color; }
      else { d.style.background=''; d.style.borderColor=''; }
    });
    const val = item.querySelector('.val');
    val.textContent = s; val.style.color = color;
  });
}

function refreshOverall() {
  const avgs = PILLARS.map(p => Math.round(pillarScores[p.id].reduce((a,b)=>a+b,0)/pillarScores[p.id].length*10)/10);
  drawOverallRadar(document.getElementById('overallRadar'), avgs, PILLARS.map(p=>p.color), PILLARS.map(p=>p.label));
  const totalAvg = (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(1);
  document.getElementById('overallScores').innerHTML =
    PILLARS.map((p,i)=>`
      <div class="overall-score-item">
        <div class="name" style="color:${p.color}">${p.label}</div>
        <div class="num" style="color:${p.color}">${avgs[i].toFixed(1)}</div>
      </div>
    `).join('') +
    `<div class="overall-score-item" style="border-left:1px solid #252830;padding-left:24px;margin-left:4px">
      <div class="name" style="color:#ff6b6b">TOTAL AVG</div>
      <div class="num" style="color:#ff6b6b">${totalAvg}</div>
    </div>`;
}

/* ---- Build UI ---- */
PILLARS.forEach(p => {
  const card = document.createElement('div');
  card.className = 'pillar-card';
  card.dataset.pillar = p.id;

  card.innerHTML = `
    <div class="pillar-label">${p.label}</div>
    <div class="pillar-sub">${p.sub}</div>
    <div class="pillar-avg" id="avg-${p.id}">Average: <span>3.0 / ${MAX}</span></div>
    <canvas id="canvas-${p.id}" class="radar" width="420" height="340"></canvas>
    <div class="scores-list" id="list-${p.id}">
      ${p.axes.map(a => `
        <div class="score-item">
          <div class="label-wrap">
            <span class="label" title="${a.label}">${a.label}</span>
            <button class="info-btn" type="button" aria-label="What good looks like for ${a.label}"><i>i</i></button>
          </div>
          <div class="dots">
            ${[1,2,3,4,5].map(d=>`<div class="dot" style="${d<=3?`background:${p.color};border-color:${p.color}`:''}"></div>`).join('')}
          </div>
          <div class="val" style="color:${p.color}">3</div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('pillarsGrid').appendChild(card);
  setupInteraction(document.getElementById(`canvas-${p.id}`), p.id, p.color, p.axes);

  // Attach click handlers to info buttons
  const infoButtons = card.querySelectorAll('.info-btn');
  infoButtons.forEach((btn, i) => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openTooltip(btn, p.axes[i], p.color);
    });
  });
});

refreshOverall();
</script>
